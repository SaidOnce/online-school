{% extends "base.html" %}
{% block title %}Удалить отзыв{% endblock %}
{% block content %}
<div class="max-w-xl">
    <a href="{% url 'course_review_list' course.id %}" class="text-emerald-400 hover:underline mb-4 inline-block">← Отзывы о курсе</a>
    <h1 class="text-3xl font-bold text-white mb-6">Удалить отзыв</h1>
    <div class="card">
        <p class="text-gray-300 mb-6">Вы уверены, что хотите удалить свой отзыв на курс «{{ course.title }}»?</p>
        <form method="post" class="flex gap-3">
            {% csrf_token %}
            <button type="submit" class="btn-danger">Удалить</button>
            <a href="{% url 'course_review_list' course.id %}" class="btn-secondary">Отмена</a>
        </form>
    </div>
</div>
{% endblock %}
