{% extends "base.html" %}
{% block title %}Вход{% endblock %}
{% block content %}
<div class="max-w-md mx-auto">
    <h1 class="text-3xl font-bold text-white mb-6 text-center">Вход в систему</h1>
    <div class="card">
        {% if form.errors %}
        <div class="mb-4 p-4 bg-red-900/30 border border-red-700 rounded-lg text-red-300 text-sm">
            Неверное имя пользователя или пароль
        </div>
        {% endif %}
        <form method="post" class="space-y-4">
            {% csrf_token %}
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Имя пользователя</label>
                <input type="text" name="username" required class="form-input" autofocus>
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-2">Пароль</label>
                <input type="password" name="password" required class="form-input">
            </div>
            <input type="hidden" name="next" value="{{ next }}">
            <button type="submit" class="btn-primary w-full">Войти</button>
        </form>
        <p class="mt-6 text-center text-gray-400 text-sm">
            Нет аккаунта?
            <a href="{% url 'signup' %}" class="text-emerald-400 hover:text-emerald-300">Зарегистрироваться</a>
        </p>
    </div>
</div>
{% endblock %}
